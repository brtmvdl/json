<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="O visualizador de JSON.">
        <link rel="icon" href="favicon.ico">

        <title>JSON</title>

        <link href="css/bootstrap.min.css" rel="stylesheet">
        <link href="jumbotron-narrow.css" rel="stylesheet">

        <script src="js/ie-emulation-modes-warning.js"></script>
    </head>

    <body>
        <div class="container">
            <div class="header">
                <h3 class="text-muted">{JSON}</h3>
            </div>

            <div class="jumbotron">
                <p class="lead">Cole o JSON aqui:</p>
                <textarea style="display: inline-block; width: 100%; height: 200px; resize: none;" id="json"></textarea>
            </div>

            <pre id="text"></pre>

            <footer class="footer">
                <p class="text-center">2020 &copy; Tarsis de Lima</p>
            </footer>

        </div>

        <script src="js/ie10-viewport-bug-workaround.js"></script>
        <script>
            var $json = document.getElementById('json');
            var $text = document.getElementById('text');
            
            function render() {
                var json = {};
                
                try {
                    json = JSON.parse($json.value);
                } catch (e) {
                    json = null;
                }
                
                var text = JSON.stringify(json, null, 4);
                if (json === null) {
                    text = null;
                }
                
                $text.innerHTML = text;
                $text.style.display = (text === null || text.length === 0) ? 'none': '';
            }

            $json.addEventListener('keyup', render, false);
            render();
        </script>
    </body>
</html>
